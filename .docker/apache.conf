# Restaurant Ordering – Apache VirtualHost configuration
# All ports share the same DocumentRoot; rewrites steer each port
# to the correct subdirectory.  Ports are declared in ports.conf.

ServerName  restaurant.local
ServerTokens Prod
ServerSignature Off

<Directory /var/www/html>
    AllowOverride All
    Require all granted
    Options -Indexes -FollowSymLinks
</Directory>

# Uploaded images — static files only, no PHP execution
<Directory /var/www/html/uploads>
    Options -Indexes -ExecCGI
    AllowOverride None
    php_admin_flag engine off
    Require all granted
</Directory>

# ── Staff portal (admin + superadmin) – :7500 ────────────────────────────────
# Single login for both ADMIN and SUPERADMIN roles.
# After login, PHP redirects each role to its own dashboard.
<VirtualHost *:7500>
    DocumentRoot /var/www/html
    php_value session.name STAFF_SESSION

    DirectoryIndex admin_login.php index.php

    RewriteEngine On
    RewriteRule ^/?$ /admin_login.php [L,R=302]

    # Block customer storefronts on this port
    <LocationMatch "^/(aseng|tittil)(/|$)">
        Require all denied
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/staff_error.log
    CustomLog ${APACHE_LOG_DIR}/staff_access.log combined
</VirtualHost>

# ── Aseng storefront – :7504 ─────────────────────────────────────────────────
<VirtualHost *:7504>
    DocumentRoot /var/www/html
    php_value session.name ASENG_SESSION

    DirectoryIndex index.html index.php

    RewriteEngine On
    RewriteRule ^/?$ /aseng/ [L,R=302]

    # Block staff panels on this port
    <LocationMatch "^/(admin|superadmin)(/|$)">
        Require all denied
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/aseng_error.log
    CustomLog ${APACHE_LOG_DIR}/aseng_access.log combined
</VirtualHost>

# ── Tittil storefront – :7505 ────────────────────────────────────────────────
<VirtualHost *:7505>
    DocumentRoot /var/www/html
    php_value session.name TITTIL_SESSION

    DirectoryIndex index.html index.php

    RewriteEngine On
    RewriteRule ^/?$ /tittil/ [L,R=302]

    # Block staff panels on this port
    <LocationMatch "^/(admin|superadmin)(/|$)">
        Require all denied
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/tittil_error.log
    CustomLog ${APACHE_LOG_DIR}/tittil_access.log combined
</VirtualHost>
