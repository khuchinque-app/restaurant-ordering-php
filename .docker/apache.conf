# Restaurant Ordering – Apache VirtualHost configuration
# One VirtualHost per port; all share the same DocumentRoot.
# Ports are declared in /etc/apache2/ports.conf via the Dockerfile.

ServerName  restaurant.local
ServerTokens Prod
ServerSignature Off

<Directory /var/www/html>
    AllowOverride All
    Require all granted
    Options -Indexes -FollowSymLinks
</Directory>

# ── Superadmin panel – :7500 ─────────────────────────────────────────────────
<VirtualHost *:7500>
    DocumentRoot /var/www/html

    # Isolate sessions so admin login does not bleed into storefronts
    php_value session.name SUPERADMIN_SESSION

    RewriteEngine On
    # Redirect bare root to the superadmin directory
    RewriteRule ^/?$ /superadmin/ [L,R=302]

    # Block customer storefronts and the admin panel from this port
    <LocationMatch "^/(aseng|tittil|admin)(/|$)">
        Require all denied
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/superadmin_error.log
    CustomLog ${APACHE_LOG_DIR}/superadmin_access.log combined
</VirtualHost>

# ── Admin panel – :7501 ──────────────────────────────────────────────────────
<VirtualHost *:7501>
    DocumentRoot /var/www/html

    php_value session.name ADMIN_SESSION

    RewriteEngine On
    RewriteRule ^/?$ /admin/ [L,R=302]

    <LocationMatch "^/(aseng|tittil|superadmin)(/|$)">
        Require all denied
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/admin_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_access.log combined
</VirtualHost>

# ── Aseng storefront – :7504 ─────────────────────────────────────────────────
<VirtualHost *:7504>
    DocumentRoot /var/www/html

    php_value session.name ASENG_SESSION

    RewriteEngine On
    RewriteRule ^/?$ /aseng/ [L,R=302]

    # Block admin portals; tittil stays accessible (cross-restaurant nav uses a
    # full port URL anyway, but the /api/ path must remain reachable here).
    <LocationMatch "^/(admin|superadmin)(/|$)">
        Require all denied
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/aseng_error.log
    CustomLog ${APACHE_LOG_DIR}/aseng_access.log combined
</VirtualHost>

# ── Tittil storefront – :7505 ────────────────────────────────────────────────
<VirtualHost *:7505>
    DocumentRoot /var/www/html

    php_value session.name TITTIL_SESSION

    RewriteEngine On
    RewriteRule ^/?$ /tittil/ [L,R=302]

    <LocationMatch "^/(admin|superadmin)(/|$)">
        Require all denied
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/tittil_error.log
    CustomLog ${APACHE_LOG_DIR}/tittil_access.log combined
</VirtualHost>
