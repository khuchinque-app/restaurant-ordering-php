<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aseng &mdash; Order Online</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .logo { color:#0d9488; }
        .partner-banner {
            background: #7c3aed;
            color: #fff;
            text-align: center;
            padding: .55rem 1rem;
            font-size: .9rem;
        }
        .partner-banner a {
            color: #e9d5ff;
            font-weight: 600;
            margin-left: .4rem;
            text-decoration: underline;
        }
        .partner-banner a:hover { color: #fff; }
    </style>
</head>
<body>

<!-- Cross-restaurant navigation -->
<div class="partner-banner">
    Also craving something different?
    <a href="#" id="partner-link">&#127870; Visit Tittil</a>
</div>

<!-- Header -->
<header class="site-header">
    <div class="header-inner">
        <div class="logo">&#127858; Aseng</div>
        <button class="cart-btn" onclick="openCart()">
            &#128717; Cart
            <span class="cart-badge" id="cart-count" style="display:none">0</span>
        </button>
    </div>
</header>

<!-- Hero -->
<div class="container">
    <div class="hero">
        <h1>Welcome to Aseng</h1>
        <p>Authentic flavors, freshly prepared. Order now and enjoy!</p>
    </div>

    <!-- Category Tabs -->
    <div class="cat-tabs" id="cat-tabs">
        <button class="cat-tab active">Loading&hellip;</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
        <input type="search" id="search-input" placeholder="Search the menu&hellip;" autocomplete="off">
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menu-grid">
        <p style="padding:2rem;color:#6b7280">Loading menu&hellip;</p>
    </div>
</div>

<!-- Cart Drawer Overlay -->
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- Cart Drawer -->
<div class="cart-drawer" id="cart-drawer">
    <div class="drawer-header">
        <h2>&#128717; Your Cart</h2>
        <button class="close-btn" onclick="closeCart()">&times;</button>
    </div>
    <div class="drawer-body" id="cart-body">
        <div class="drawer-empty">&#128717;<br>Your cart is empty</div>
    </div>
    <div class="drawer-footer" id="cart-footer"></div>
</div>

<!-- Order Confirmed Modal -->
<div class="confirm-modal" id="order-confirm">
    <div class="confirm-box">
        <div class="confirm-icon">&#9989;</div>
        <h2>Order Placed!</h2>
        <p>Your order <strong id="confirm-order-num"></strong> has been received. We'll prepare it right away!</p>
        <button class="confirm-btn" onclick="document.getElementById('order-confirm').classList.remove('open')">Continue Browsing</button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="assets/app.js"></script>
</body>
</html>
