<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grill House &mdash; Order Online</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        :root { --primary:#dc2626; --primary-dark:#b91c1c; }
        .site-header { background:#1a1a1a; }
        .logo { color:#dc2626; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <div class="logo">&#128293; Grill House</div>
        <button class="cart-btn" onclick="openCart()">
            &#128717; Cart
            <span class="cart-badge" id="cart-count" style="display:none">0</span>
        </button>
    </div>
</header>

<div class="container">
    <div class="hero">
        <h1>Welcome to Grill House</h1>
        <p>Best grills in town. Flame-cooked to perfection — order now!</p>
    </div>
    <div class="cat-tabs" id="cat-tabs"><button class="cat-tab active">Loading…</button></div>
    <div class="search-wrap"><input type="search" id="search-input" placeholder="Search the menu…" autocomplete="off"></div>
    <div class="menu-grid" id="menu-grid"><p style="padding:2rem;color:#6b7280">Loading menu…</p></div>
</div>

<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="cart-drawer" id="cart-drawer">
    <div class="drawer-header">
        <h2>&#128717; Your Cart</h2>
        <button class="close-btn" onclick="closeCart()">&times;</button>
    </div>
    <div class="drawer-body" id="cart-body"><div class="drawer-empty">&#128717;<br>Your cart is empty</div></div>
    <div class="drawer-footer" id="cart-footer"></div>
</div>

<div class="confirm-modal" id="order-confirm">
    <div class="confirm-box">
        <div class="confirm-icon">&#9989;</div>
        <h2>Order Placed!</h2>
        <p>Your order <strong id="confirm-order-num"></strong> has been received. We'll fire it up right away!</p>
        <button class="confirm-btn" onclick="document.getElementById('order-confirm').classList.remove('open')">Continue Browsing</button>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="assets/app.js"></script>
</body>
</html>
