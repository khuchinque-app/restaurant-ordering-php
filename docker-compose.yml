version: '3.9'

services:
  restaurant:
    build: .
    restart: unless-stopped
    ports:
      - "7500:7500"   # Superadmin panel
      - "7501:7501"   # Admin panel
      - "7504:7504"   # Aseng restaurant storefront
      - "7505:7505"   # Tittil restaurant storefront
    volumes:
      - db_data:/var/www/html/data
    env_file:
      - .env

volumes:
  db_data:
    driver: local
